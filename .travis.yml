language: node_js

node_js:
  - 13

os:
  - linux

dist: xenial

install:
  - yarn install --frozen-lockfile

script:
  - yarn lint:fix
  - yarn test

deploy:
  provider: heroku
  api_key: $HEROKU_API_KEY
  strategy: api
  app:
    master: atlas-discord-bot
    staging: atlas-discord-bot-canary
    dev: atlas-discord-bot-preto

notifications:
  email: false
  webhooks: https://gorillas-webhoook.glitch.me/notify