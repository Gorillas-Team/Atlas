language: node_js
node_js:
- 13
os:
- linux
dist: xenial
env:
- DOCKER_TAG=$TRAVIS_BRANCH
before_install:
- openssl aes-256-cbc -K $encrypted_64a52fc5bedc_key -iv $encrypted_64a52fc5bedc_iv
  -in deploy_rsa.enc -out .\\.deploy\\deploy_rsa -d
- if [ "$TRAVIS_BRANCH" == "master" ]; then DOCKER_TAG="latest"; fi
install:
- yarn install --frozen-lockfile
jobs:
  include:
  - stage: Tests
    name: ESLint
    script: yarn lint
  - script: yarn test
    name: Unit tests
  - stage: Build
    name: Docker build
    script: docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
  - script: docker tag $DOCKER_IMAGE:$DOCKER_TAG $DOCKER_IMAGE:$DOCKER_TAG
    name: Docker Tagging
  - stage: Docker push
    name: Docker login
    script: docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  - script: docker push $DOCKER_IMAGE:$DOCKER_TAG
    name: Docker push
deploy:
- provider: script
  script: bash .deploy/deploy.sh
  on:
    branch: master
- provider: script
  script: bash .deploy/deploy.sh
  on:
    branch: staging
notifications:
  email: false
  webhooks: "$GORILLAS_HOOK"
