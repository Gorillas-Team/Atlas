language: node_js
node_js:
  - 13
os:
  - linux
dist: xenial
env:
  - DOCKER_TAG=$TRAVIS_BRANCH
before_install:
  - openssl aes-256-cbc -K $encrypted_4a0767079a26_key -iv $encrypted_4a0767079a26_iv -in .deploy/deploy_rsa.enc -out .deploy/deploy_rsa -d
  - if [ "$TRAVIS_BRANCH" == "master" ]; then DOCKER_TAG="latest"; fi
install:
  - echo  | base64 -d >> $HOME/.ssh/known_hosts
  - yarn install --frozen-lockfile
jobs:
  include:
    - stage: Tests
      name: ESLint
      script: yarn lint
    - script: yarn test
      name: Unit tests
    - stage: Build
      name: Docker build & deploy
      script:
        - docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
        - docker tag $DOCKER_IMAGE:$DOCKER_TAG $DOCKER_IMAGE:$DOCKER_TAG
        - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
        - docker push $DOCKER_IMAGE:$DOCKER_TAG
deploy:
  - provider: script
    script: bash .deploy/deploy.sh
    on:
      branch: master
  - provider: script
    script: bash .deploy/deploy.sh
    on:
      branch: staging
notifications:
  email: false
  webhooks: $GORILLAS_HOOK
