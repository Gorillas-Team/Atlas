language: node_js
node_js:
  - 13
os:
  - linux
dist: xenial
env:
  - DOCKER_TAG=$TRAVIS_BRANCH
before_install:
  - openssl aes-256-cbc -K $encrypted_4a0767079a26_key -iv $encrypted_4a0767079a26_iv -in .deploy/deploy_rsa.enc -out deploy_rsa -d
  - if [ "$TRAVIS_BRANCH" == "master" ]; then DOCKER_TAG="latest"; fi
install:
  - yarn install --frozen-lockfile
script:
  - yarn lint
  - yarn test
  - docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
  - docker tag $DOCKER_IMAGE:$DOCKER_TAG $DOCKER_IMAGE:$DOCKER_TAG
  - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
  - docker push $DOCKER_IMAGE:$DOCKER_TAG
deploy:
  - provider: script
    script: bash .deploy/deploy.sh
    on:
      branch: master
  - provider: script
    script: bash .deploy/deploy.sh
    on:
      branch: staging
notifications:
  email: false
  webhooks: $GORILLAS_HOOK
